<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstaSnap – Direct Instagram Video & Image Downloader</title>
  <meta name="description" content="InstaSnap – Download Instagram Reels, Videos, and Photos directly. Fast, free, and secure." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0c12;
      --card: #141824;
      --accent: #ff0055;
      --accent-glow: rgba(255, 0, 85, 0.4);
      --text: #f0f2f5;
      --muted: #8a94ad;
      --border: #1f2638;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

    .container { max-width: 600px; width: 100%; text-align: center; }

    h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; background: linear-gradient(135deg, #fff 30%, var(--accent)); -webkit-background-clip: text; -webkit-fill-color: transparent; }
    p { color: var(--muted); margin-bottom: 40px; font-size: 1.1rem; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; background: #07090f; border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; color: #fff; font-family: inherit; font-size: 1rem; outline: none; transition: 0.2s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

    button.go { background: var(--accent); border: none; border-radius: 14px; padding: 16px 30px; color: #fff; font-weight: 700; cursor: pointer; transition: 0.2s; }
    button.go:hover { transform: translateY(-2px); box-shadow: 0 10px 25px var(--accent-glow); }
    button.go:disabled { opacity: 0.5; cursor: not-allowed; }

    .status { margin-top: 20px; font-size: 0.9rem; font-weight: 600; display: none; }
    .status.err { color: #ff3e3e; display: block; }
    .status.ok { color: #00ff88; display: block; }

    .result { margin-top: 30px; display: none; text-align: left; background: #07090f; border-radius: 16px; padding: 20px; border: 1px solid var(--border); animation: slideUp 0.4s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .res-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    
    .btn-dl { display: block; width: 100%; background: #fff; color: #000; border: none; border-radius: 12px; padding: 14px; font-weight: 800; text-decoration: none; text-align: center; transition: 0.2s; }
    .btn-dl:hover { background: var(--accent); color: #fff; }

    .footer { margin-top: 60px; font-size: 0.8rem; color: var(--muted); opacity: 0.6; }

    .spin { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: sp 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes sp { to { transform: rotate(360deg); } }

    @media (max-width: 500px) {
      h1 { font-size: 2.5rem; }
      .input-group { flex-direction: column; }
      button.go { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>InstaSnap</h1>
    <p>Download Instagram Reels, Videos & Photos instantly.</p>

    <div class="card">
      <div class="input-group">
        <input type="url" id="urlIn" placeholder="Paste Instagram link here..." />
        <button class="go" id="goBtn" onclick="fetchMedia()">Download</button>
      </div>

      <div class="status" id="status"></div>

      <div class="result" id="result">
        <div class="res-title">Media Found</div>
        <a href="#" class="btn-dl" id="dlLink" target="_blank" download>Download Now</a>
      </div>
    </div>

    <div class="footer">
      © 2025 InstaSnap. For personal use only. <br>
      YouTube is not supported.
    </div>
  </div>

  <script>
    async function fetchMedia() {
      const urlIn = document.getElementById('urlIn');
      const goBtn = document.getElementById('goBtn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const dlLink = document.getElementById('dlLink');

      const url = urlIn.value.trim();
      if (!url) {
        status.textContent = '❌ Please paste a link first!';
        status.className = 'status err';
        return;
      }

      // UI State
      goBtn.disabled = true;
      goBtn.innerHTML = '<span class="spin"></span>Fetching...';
      status.style.display = 'none';
      result.style.display = 'none';

      try {
        const response = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (!response.ok || data.status === 'error') {
          throw new Error(data.message || 'Failed to fetch media.');
        }

        // Success
        dlLink.href = data.url;
        result.style.display = 'block';
        status.textContent = '✅ Media ready to download!';
        status.className = 'status ok';

      } catch (err) {
        status.textContent = '❌ ' + err.message;
        status.className = 'status err';
      } finally {
        goBtn.disabled = false;
        goBtn.innerHTML = 'Download';
      }
    }
  </script>

</body>
</html>
